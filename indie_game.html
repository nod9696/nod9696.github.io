<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>インディーゲーム原石発掘チーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0c10;
      color: #e8e8f0;
      font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
      min-height: 100vh;
      padding: 20px 16px 48px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    input, textarea, select {
      width: 100%;
      background: #181920;
      border: 1px solid #2a2b3a;
      border-radius: 10px;
      color: #e8e8f0;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #d4a030;
    }

    input[type="password"] {
      font-family: monospace;
      letter-spacing: 0.1em;
    }

    select { cursor: pointer; }
    select option { background: #181920; }

    .field { margin-bottom: 16px; }

    textarea {
      min-height: 70px;
      resize: vertical;
      font-family: -apple-system, "Hiragino Sans", sans-serif;
    }

    .key-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .key-row input { flex: 1; }

    .btn-save {
      background: #2a2b3a;
      border: none;
      border-radius: 10px;
      color: #aaa;
      font-size: 13px;
      padding: 12px 14px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-save:active { background: #383950; }

    button.run {
      width: 100%;
      background: linear-gradient(135deg, #c8860a, #e8c040);
      border: none;
      border-radius: 12px;
      color: #1a1000;
      font-size: 16px;
      font-weight: 700;
      padding: 15px;
      cursor: pointer;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    button.run:disabled { opacity: 0.4; }
    button.run:active:not(:disabled) { opacity: 0.85; }

    /* エージェント進捗 */
    .agents {
      display: flex;
      gap: 6px;
      margin: 24px 0 20px;
      flex-wrap: wrap;
    }

    .agent-chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #2a2b3a;
      color: #555;
      transition: all 0.3s;
    }

    .agent-chip.active {
      border-color: #d4a030;
      color: #d4a030;
      background: #d4a03018;
    }

    .agent-chip.done {
      border-color: #3a7a4a;
      color: #3a7a4a;
      background: #3a7a4a18;
    }

    /* 出力エリア */
    .output-section { display: none; }
    .output-section.visible { display: block; }

    .agent-block {
      margin-bottom: 24px;
      border: 1px solid #2a2b3a;
      border-radius: 12px;
      overflow: hidden;
    }

    .agent-block.active { border-color: #d4a03055; }
    .agent-block.done { border-color: #3a7a4a33; }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #131420;
      font-size: 13px;
      font-weight: 600;
    }

    .agent-icon { font-size: 16px; }
    .agent-name { flex: 1; }
    .agent-status { font-size: 11px; color: #555; }
    .agent-status.working { color: #d4a030; }
    .agent-status.done { color: #3a7a4a; }

    .agent-content {
      padding: 14px;
      font-size: 14px;
      line-height: 1.8;
      color: #ccd;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 40px;
    }

    /* 最終稿 */
    .final-block .agent-header {
      background: #181408;
      border-bottom: 1px solid #5a4010;
    }

    .final-block { border-color: #c8860a33; }
    .final-block.done { border-color: #e8c04088; }

    .final-block .agent-content {
      font-size: 15px;
      line-height: 2;
      color: #f0e8d0;
    }

    /* コピー・ダウンロード */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .actions button {
      flex: 1;
      background: #181920;
      border: 1px solid #2a2b3a;
      border-radius: 10px;
      color: #aaa;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .actions button:active { background: #222330; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #d4a030;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .error-msg {
      background: #2a1518;
      border: 1px solid #aa3344;
      border-radius: 10px;
      color: #ff8090;
      font-size: 13px;
      padding: 12px 14px;
      margin-top: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint-note {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
    }

    .date-range {
      display: none;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .date-range.visible { display: flex; }

    .date-range input[type="date"] {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      color-scheme: dark;
    }

    .date-range span {
      color: #555;
      font-size: 13px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <h1>💎 インディーゲーム原石発掘チーム</h1>
  <p class="subtitle">5つのAIエージェントが埋もれた個人制作ゲームの原石を発掘・紹介します</p>

  <!-- APIキー -->
  <div class="field">
    <label>Anthropic API Key</label>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      <button class="btn-save" onclick="saveKey()">保存</button>
    </div>
  </div>

  <!-- 発掘ヒント -->
  <div class="field">
    <label>発掘ヒント（ジャンル・雰囲気・テーマなど）</label>
    <textarea id="hint" placeholder="例: 孤独な世界観のパズルゲーム、pixel artで作られた農場系、不思議な雰囲気のホラー…&#10;空欄でもOK — チームが独自に原石を選びます"></textarea>
    <p class="hint-note">※ 具体的なタイトルより「こんな感じ」という手がかりが発掘向きです</p>
  </div>

  <!-- 発掘フィルター -->
  <div class="field-row">
    <div class="field">
      <label>発掘対象期間</label>
      <select id="period" onchange="toggleDateRange()">
        <option value="2024〜2026年にリリースされた">近作（2024〜2026年）</option>
        <option value="2020〜2023年にリリースされた">やや前（2020〜2023年）</option>
        <option value="2015〜2019年にリリースされた">往年（2015〜2019年）</option>
        <option value="年代を問わない">年代不問</option>
        <option value="custom">📅 期間を指定…</option>
      </select>
      <div class="date-range" id="dateRange">
        <input type="date" id="dateFrom">
        <span>〜</span>
        <input type="date" id="dateTo">
      </div>
    </div>
    <div class="field">
      <label>発掘場所</label>
      <select id="platform">
        <option value="itch.io や Steam の">itch.io / Steam</option>
        <option value="Steam の">Steam</option>
        <option value="itch.io の">itch.io</option>
        <option value="ゲームジャム作品を含む">ゲームジャム作品</option>
        <option value="全プラットフォームの">全プラットフォーム</option>
      </select>
    </div>
  </div>

  <button class="run" id="runBtn" onclick="runTeam()">💎 原石を発掘する</button>

  <div class="error-msg" id="errorMsg"></div>

  <!-- エージェント進捗チップ -->
  <div class="agents" id="agentChips" style="display:none">
    <span class="agent-chip" id="chip-0">🔭 原石ハンター</span>
    <span class="agent-chip" id="chip-1">🔬 鑑定士</span>
    <span class="agent-chip" id="chip-2">🕵️ 開発者探偵</span>
    <span class="agent-chip" id="chip-3">🌱 体験証言ライター</span>
    <span class="agent-chip" id="chip-4">📜 発掘記事編集長</span>
  </div>

  <!-- 出力エリア -->
  <div class="output-section" id="outputSection">

    <div class="agent-block" id="block-0">
      <div class="agent-header">
        <span class="agent-icon">🔭</span>
        <span class="agent-name">原石ハンター</span>
        <span class="agent-status" id="status-0">待機中</span>
      </div>
      <div class="agent-content" id="content-0"></div>
    </div>

    <div class="agent-block" id="block-1">
      <div class="agent-header">
        <span class="agent-icon">🔬</span>
        <span class="agent-name">鑑定士</span>
        <span class="agent-status" id="status-1">待機中</span>
      </div>
      <div class="agent-content" id="content-1"></div>
    </div>

    <div class="agent-block" id="block-2">
      <div class="agent-header">
        <span class="agent-icon">🕵️</span>
        <span class="agent-name">開発者探偵</span>
        <span class="agent-status" id="status-2">待機中</span>
      </div>
      <div class="agent-content" id="content-2"></div>
    </div>

    <div class="agent-block" id="block-3">
      <div class="agent-header">
        <span class="agent-icon">🌱</span>
        <span class="agent-name">体験証言ライター</span>
        <span class="agent-status" id="status-3">待機中</span>
      </div>
      <div class="agent-content" id="content-3"></div>
    </div>

    <div class="agent-block final-block" id="block-4">
      <div class="agent-header">
        <span class="agent-icon">📜</span>
        <span class="agent-name">発掘記事編集長 — 発掘レポート</span>
        <span class="agent-status" id="status-4">待機中</span>
      </div>
      <div class="agent-content" id="content-4"></div>
    </div>

    <div class="actions" id="actionBtns" style="display:none">
      <button onclick="copyArticle()">📋 コピー</button>
      <button onclick="downloadArticle()">⬇️ 保存</button>
    </div>

  </div>

<script>
const MODEL = "claude-haiku-4-5-20251001";
const API_URL = "https://api.anthropic.com/v1/messages";

window.addEventListener('load', () => {
  const saved = localStorage.getItem('anthropic_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
});

function toggleDateRange() {
  const isCustom = document.getElementById('period').value === 'custom';
  document.getElementById('dateRange').classList.toggle('visible', isCustom);
  if (isCustom) {
    const today = new Date().toISOString().slice(0, 10);
    const past = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
    const df = document.getElementById('dateFrom');
    const dt = document.getElementById('dateTo');
    if (!df.value) df.value = past;
    if (!dt.value) dt.value = today;
  }
}

function getPeriodValue() {
  const sel = document.getElementById('period');
  if (sel.value !== 'custom') return sel.value;
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (!from || !to) return '年代を問わない';
  const fmt = (d) => d.replaceAll('-', '/');
  return `${fmt(from)}〜${fmt(to)}の期間にリリースされた`;
}

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (key) {
    localStorage.setItem('anthropic_api_key', key);
    const btn = document.querySelector('.btn-save');
    btn.textContent = '✓ 保存';
    setTimeout(() => btn.textContent = '保存', 1500);
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

async function streamMessage(apiKey, systemPrompt, userMessage, contentEl, statusEl, chipEl, useWebSearch = false) {
  statusEl.textContent = '調査中...';
  statusEl.className = 'agent-status working';
  chipEl.className = 'agent-chip active';

  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  contentEl.appendChild(cursor);

  const body = {
    model: MODEL,
    max_tokens: 4096,
    stream: true,
    system: systemPrompt,
    messages: [{ role: "user", content: userMessage }]
  };

  if (useWebSearch) {
    body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  }

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';
  let currentBlockType = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;

      try {
        const evt = JSON.parse(data);

        if (evt.type === 'content_block_start') {
          currentBlockType = evt.content_block?.type;
          if (currentBlockType === 'tool_use' && evt.content_block?.name === 'web_search') {
            statusEl.textContent = '🔍 ウェブ検索中...';
          }
        }

        if (evt.type === 'content_block_stop') {
          if (currentBlockType === 'tool_use') {
            statusEl.textContent = '📊 情報解析中...';
          }
          currentBlockType = null;
        }

        if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
          fullText += evt.delta.text;
          contentEl.insertBefore(document.createTextNode(evt.delta.text), cursor);
          contentEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
          if (currentBlockType === null) statusEl.textContent = '執筆中...';
        }
      } catch {}
    }
  }

  cursor.remove();
  statusEl.textContent = '完了';
  statusEl.className = 'agent-status done';
  chipEl.className = 'agent-chip done';

  return fullText;
}

async function runTeam() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const hint = document.getElementById('hint').value.trim() || '特になし（チームに一任）';
  const period = getPeriodValue();
  const platform = document.getElementById('platform').value;

  hideError();
  if (!apiKey) { showError('APIキーを入力してください'); return; }

  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = '💎 発掘中...';

  document.getElementById('agentChips').style.display = 'flex';
  document.getElementById('outputSection').classList.add('visible');
  document.getElementById('actionBtns').style.display = 'none';

  for (let i = 0; i < 5; i++) {
    document.getElementById(`content-${i}`).textContent = '';
    document.getElementById(`status-${i}`).textContent = '待機中';
    document.getElementById(`status-${i}`).className = 'agent-status';
    document.getElementById(`block-${i}`).className = i === 4 ? 'agent-block final-block' : 'agent-block';
    document.getElementById(`chip-${i}`).className = 'agent-chip';
  }

  const g = (id) => document.getElementById(id);
  const mission = `${period}${platform}個人制作インディーゲームの原石を発掘する。発掘ヒント: ${hint}`;

  try {
    // ── Step 1: 原石ハンター ──
    g('block-0').classList.add('active');
    const candidates = await streamMessage(
      apiKey,
      `あなたはインディーゲームの原石を発掘するハンターです。
ウェブ検索ツールを積極的に使い、itch.io・Steam・ゲームジャムの結果ページ・開発者SNSなどを実際に調査します。
発掘の最重要基準は以下の3つです：
① キャラクターの魅力（個性・感情移入・記憶に残るキャラクター）
② ストーリーテリングの魅力（展開・没入感・語り方のユニークさ）
③ 世界観の魅力（独自性・雰囲気・その世界に浸りたくなる力）
この3軸で高得点を出せる作品だけを選んでください。`,
      `以下の条件で個人制作インディーゲームの原石をウェブ検索で調査し、必ず3タイトルを発掘してください。\n\nミッション: ${mission}\n\n【最重要選定基準】各タイトルは以下3点で評価し、合計スコアが高いものを選ぶこと:\n★ キャラクターの魅力（個性的・感情移入できる・記憶に残る）\n★ ストーリーテリングの魅力（展開が面白い・語り方が独特・没入感がある）\n★ 世界観の魅力（独自の世界が構築されている・雰囲気が際立つ・没入できる）\n\n【重要】必ず正確に3タイトルをピックアップすること。架空のタイトルは禁止。実在確認済みのものだけを挙げること。\n\n各タイトルについて報告:\n- タイトル名・開発者名・配布URL\n- 上記3基準それぞれのスコア（5点満点）と根拠\n- なぜ埋もれているのか（露出・知名度の低さの理由）\n- 発掘価値が高いと判断した理由`,
      g('content-0'), g('status-0'), g('chip-0'),
      true
    );
    g('block-0').classList.remove('active');
    g('block-0').classList.add('done');

    // ── Step 2: 鑑定士 ──
    g('block-1').classList.add('active');
    const appraisal = await streamMessage(
      apiKey,
      `あなたはインディーゲームの鑑定士です。
「原石」の本質的な価値を見抜くプロフェッショナルです。
鑑定の3大軸：①キャラクターの魅力、②ストーリーテリングの魅力、③世界観の魅力。
この3軸を中心に据えて、作品が持つポテンシャルを具体的な根拠とともに鑑定書にまとめてください。`,
      `原石ハンターが発掘した3タイトル全てについて鑑定書を作成してください。\n\n【発掘報告】\n${candidates}\n\n【重要】3タイトル全てについて個別に鑑定すること。\n\n各タイトルの鑑定書（3軸を必ず評価）:\n1. ★キャラクターの魅力：個性・感情移入ポイント・記憶に残る要素\n2. ★ストーリーテリングの魅力：語り口・展開・没入感の仕掛け\n3. ★世界観の魅力：独自性・雰囲気・没入できる理由\n4. 「大手スタジオには作れない」個人制作ならではの要素\n5. 原石としての総合評価`,
      g('content-1'), g('status-1'), g('chip-1')
    );
    g('block-1').classList.remove('active');
    g('block-1').classList.add('done');

    // ── Step 3: 開発者探偵 ──
    g('block-2').classList.add('active');
    const devStory = await streamMessage(
      apiKey,
      `あなたはインディーゲーム開発者の素顔を掘り起こす探偵です。
一人でゲームを作るということの本質——孤独な作業、限られたリソース、
それでも作り続ける理由——を丁寧に調査します。
開発者がどんな人物で、何を伝えたくてこのゲームを作ったのかを
SNS投稿・インタビュー・開発ブログの痕跡から推理・再構成してください。`,
      `発掘・鑑定された3タイトル全ての開発者像と制作背景を探偵として調査してください。\n\n【発掘報告】\n${candidates}\n\n【鑑定書】\n${appraisal}\n\n【重要】3タイトル全ての開発者について個別に調査すること。\n\n各タイトルの調査報告書:\n1. 開発者のプロフィール推測（職業・年齢層・バックグラウンド）\n2. このゲームを作るに至った動機・原体験\n3. ★魅力的なキャラクターが生まれた背景（開発者の人生経験・影響源）\n4. ★独自のストーリーテリングが生まれた理由（影響を受けた作品・伝えたかったこと）\n5. ★独特な世界観が生まれた源泉（ビジョン・美意識・制作哲学）`,
      g('content-2'), g('status-2'), g('chip-2')
    );
    g('block-2').classList.remove('active');
    g('block-2').classList.add('done');

    // ── Step 4: 体験証言ライター ──
    g('block-3').classList.add('active');
    const testimony = await streamMessage(
      apiKey,
      `あなたは「埋もれたゲームを遊んだプレイヤー」の体験を言語化する証言ライターです。
有名作のレビューとは違う、まだほとんど誰も語っていない体験の新鮮さを表現します。
「こんなゲームが存在したのか」という発見の感動、
「なぜみんな知らないんだろう」という不思議さ、
小さいけれど確かに心に刺さる体験を、丁寧に言葉にしてください。`,
      `発掘された3タイトル全てについて、実際にプレイしたプレイヤーの視点で体験を証言してください。\n\n【発掘報告】\n${candidates}\n\n【鑑定書】\n${appraisal}\n\n【開発者調査】\n${devStory}\n\n【重要】3タイトル全てについて個別に証言すること。\n\n各タイトルの証言（3軸の体験を必ず言語化）:\n1. ★キャラクターに惹かれた瞬間（どのキャラクターの、どの場面で心が動いたか）\n2. ★ストーリーテリングに驚いた瞬間（「この語り方は初めて」と感じた場面）\n3. ★世界観に没入した瞬間（その世界にいると錯覚した体験）\n4. このゲームが特に刺さる人物像\n5. 遊び終わったあとに残る感情・余韻`,
      g('content-3'), g('status-3'), g('chip-3')
    );
    g('block-3').classList.remove('active');
    g('block-3').classList.add('done');

    // ── Step 5: 発掘記事編集長（完成レポート） ──
    g('block-4').classList.add('active');
    await streamMessage(
      apiKey,
      `あなたはインディーゲームの原石を世に送り出す発掘記事の編集長です。
チームが掘り当てた原石を、まだゲームを知らない読者に伝える発掘レポートを書きます。
記事の訴求軸は「キャラクターの魅力」「ストーリーテリングの魅力」「世界観の魅力」の3点です。
読者が記事を読み終えたあと、今すぐそのゲームを検索したくなることを目指してください。`,
      `チームの全調査を統合して、発掘された3タイトルを紹介する発掘レポートを執筆してください。\n\n【発掘報告】\n${candidates}\n\n【鑑定書】\n${appraisal}\n\n【開発者調査】\n${devStory}\n\n【プレイヤー証言】\n${testimony}\n\n発掘レポートの要件:\n- キャッチーな全体タイトル\n- リード文（80〜120字）\n- 【重要】3タイトルそれぞれに独立したセクション（見出し付き）\n- 各セクション（600〜900字）：①キャラの魅力 ②ストーリーテリングの魅力 ③世界観の魅力 を軸に執筆。末尾に「▶ 入手方法」\n- 締めくくり文（100字程度）\n- 全体文字数：2500〜3500字`,
      g('content-4'), g('status-4'), g('chip-4')
    );
    g('block-4').classList.remove('active');
    g('block-4').classList.add('done');

    document.getElementById('actionBtns').style.display = 'flex';

  } catch (err) {
    showError('エラー: ' + err.message);
  }

  runBtn.disabled = false;
  runBtn.textContent = '💎 原石を発掘する';
}

function copyArticle() {
  const text = document.getElementById('content-4').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.actions button');
    btn.textContent = '✓ コピー完了';
    setTimeout(() => btn.textContent = '📋 コピー', 2000);
  });
}

function downloadArticle() {
  const hint = document.getElementById('hint').value.trim() || '原石発掘';
  const text = document.getElementById('content-4').textContent;
  const blob = new Blob([`発掘ヒント: ${hint}\n${'='.repeat(40)}\n\n${text}`], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gem_discovery_${Date.now()}.txt`;
  a.click();
}
</script>

</body>
</html>
